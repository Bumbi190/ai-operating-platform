<svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark rounded square background -->
  <rect width="100" height="100" rx="20" fill="#070c18"/>
  <!-- 8-facet metallic star mark -->
  <polygon points="50,5 64,36 50,50" fill="#dde4ed"/>
  <polygon points="50,5 50,50 36,36" fill="#bcc8d8"/>
  <polygon points="64,36 95,50 50,50" fill="#ccd6e4"/>
  <polygon points="95,50 64,64 50,50" fill="#a0b0c4"/>
  <polygon points="64,64 50,95 50,50" fill="#8898ac"/>
  <polygon points="50,95 36,64 50,50" fill="#7488a0"/>
  <polygon points="36,64 5,50 50,50" fill="#8090a4"/>
  <polygon points="5,50 36,36 50,50" fill="#a8b8cc"/>
  <!-- Separator lines -->
  <line x1="50" y1="5" x2="50" y2="95" stroke="rgba(0,0,0,0.3)" stroke-width="0.8"/>
  <line x1="5" y1="50" x2="95" y2="50" stroke="rgba(0,0,0,0.3)" stroke-width="0.8"/>
  <line x1="36" y1="36" x2="64" y2="64" stroke="rgba(0,0,0,0.2)" stroke-width="0.6"/>
  <line x1="64" y1="36" x2="36" y2="64" stroke="rgba(0,0,0,0.2)" stroke-width="0.6"/>
  <!-- Outer edge -->
  <polygon points="50,5 64,36 95,50 64,64 50,95 36,64 5,50 36,36" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Center diamond -->
  <polygon points="50,38 62,50 50,62 38,50" fill="rgba(240,248,255,0.2)" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
</svg>
