<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="The Prompt">
  <!-- Favicon — "P" monogram with editorial lines, readable at 16×16 -->
  <rect width="32" height="32" fill="#000000"/>

  <!-- Top micro-rule -->
  <line x1="3" y1="5" x2="29" y2="5" stroke="white" stroke-width="1.5"/>

  <!-- "P" lettermark — tight condensed -->
  <text
    x="16"
    y="26"
    text-anchor="middle"
    dominant-baseline="auto"
    font-family="'Barlow Condensed', 'Arial Narrow', Impact, sans-serif"
    font-weight="800"
    font-size="22"
    fill="white"
  >TP</text>

  <!-- Bottom micro-rule -->
  <line x1="3" y1="29" x2="29" y2="29" stroke="white" stroke-width="1.5"/>
</svg>
