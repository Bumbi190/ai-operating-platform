<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" role="img" aria-label="The Prompt">
  <!-- Square app icon — black background for social media profile pictures -->
  <rect width="400" height="400" fill="#000000"/>

  <!-- Top rule -->
  <line x1="32" y1="148" x2="368" y2="148" stroke="white" stroke-width="2.5"/>
  <line x1="32" y1="154" x2="368" y2="154" stroke="white" stroke-width="0.8"/>

  <!-- THE — smaller, above -->
  <text
    x="200"
    y="208"
    text-anchor="middle"
    dominant-baseline="auto"
    font-family="'Barlow Condensed', 'Arial Narrow', Impact, sans-serif"
    font-weight="800"
    font-size="58"
    letter-spacing="18"
    fill="white"
  >THE</text>

  <!-- PROMPT — dominant -->
  <text
    x="200"
    y="268"
    text-anchor="middle"
    dominant-baseline="auto"
    font-family="'Barlow Condensed', 'Arial Narrow', Impact, sans-serif"
    font-weight="800"
    font-size="72"
    letter-spacing="4"
    fill="white"
  >PROMPT</text>

  <!-- Bottom rule -->
  <line x1="32" y1="276" x2="368" y2="276" stroke="white" stroke-width="0.8"/>
  <line x1="32" y1="282" x2="368" y2="282" stroke="white" stroke-width="2.5"/>
</svg>
