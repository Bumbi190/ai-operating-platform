<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" width="320" height="72" role="img" aria-label="The Prompt">
  <!-- Compact watermark — optimized for bottom-right video overlay -->
  <!-- Use at 240×54px or smaller in video compositions -->

  <!-- Top rule -->
  <line x1="0" y1="10" x2="320" y2="10" stroke="white" stroke-width="1.8" stroke-opacity="0.9"/>
  <line x1="0" y1="15" x2="320" y2="15" stroke="white" stroke-width="0.6" stroke-opacity="0.9"/>

  <!-- Wordmark -->
  <text
    x="160"
    y="56"
    text-anchor="middle"
    dominant-baseline="auto"
    font-family="'Barlow Condensed', 'Arial Narrow', Impact, 'Helvetica Neue Condensed', sans-serif"
    font-weight="800"
    font-size="44"
    letter-spacing="3"
    fill="white"
    opacity="0.92"
  >THE PROMPT</text>

  <!-- Bottom rule -->
  <line x1="0" y1="62" x2="320" y2="62" stroke="white" stroke-width="0.6" stroke-opacity="0.9"/>
  <line x1="0" y1="67" x2="320" y2="67" stroke="white" stroke-width="1.8" stroke-opacity="0.9"/>
</svg>
